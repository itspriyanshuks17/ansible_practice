---
- name: Install multiple packages (example)
  hosts: servers
  become: true
  vars:
    packages:
      - git
      - htop
      - tree
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_facts['pkg_mgr'] == 'apt'

    - name: Install package
      apt:
        name: "{{ item }}"
        state: present
      loop: "{{ packages }}"
      register: pkg_results

    - name: Show package install results
      debug:
        var: pkg_results.results

- name: Create example users
  hosts: servers
  become: true
  vars:
    users:
      - name: alice
        uid: 1001
      - name: bob
        uid: 1002
  tasks:
    - name: Ensure user exists
      user:
        name: "{{ item.name }}"
        uid: "{{ item.uid }}"
        state: present
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"